    description: "The Poway Symphony Orchestra is a community-based ensemble dedicated to bringing high-quality orchestral music to local audiences. This capstone explores how intentional design can elevate the orchestra's online experience, making it easier for users to discover concerts, connect with the musicians, and support the organization. Through user research and design iteration, the project emphasizes clarity, accessibility, and storytelling so the site does more than present information. It invites people into the world of the orchestra and makes participation feel welcoming, useful, and memorable."
